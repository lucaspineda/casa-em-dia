openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Create lead
      description: Saves a website lead submission for follow-up.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLeadResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateLeadRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 8
          maxLength: 30
        address:
          type: string
          minLength: 5
          maxLength: 300
        consent:
          type: boolean
      required:
        - email
        - phone
        - address
        - consent
    CreateLeadResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

